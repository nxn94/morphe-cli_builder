name: Build Morphe-patched apps

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *" # daily at 05:15 UTC

permissions:
  contents: write
  actions: read

jobs:
  check-versions:
    runs-on: ubuntu-latest
    outputs:
      should-build: ${{ steps.version-check.outputs.should-build }}
      matrix-include: ${{ steps.version-check.outputs.matrix-include }}
      repo-versions: ${{ steps.version-check.outputs.repo-versions }}
      cli-version: ${{ steps.version-check.outputs.cli-version }}
      cli-branch: ${{ steps.version-check.outputs.cli-branch }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check latest versions
        id: version-check
        run: |
          set -euo pipefail

          # Validate required config keys.
          if ! jq -e '.patch_repos | type == "object" and length > 0' config.json >/dev/null 2>&1; then
            echo "::error::config.json is missing 'patch_repos' or it is empty. Add per-app repo assignments."
            exit 1
          fi
          if ! jq -e '.cli | has("repo") and has("branch")' config.json >/dev/null 2>&1; then
            echo "::error::config.json is missing 'cli.repo' or 'cli.branch'."
            exit 1
          fi

          CLI_REPO="$(jq -r '.cli.repo' config.json)"
          CLI_BRANCH="$(jq -r '.cli.branch | ascii_downcase' config.json)"
          if [ "$CLI_BRANCH" != "main" ] && [ "$CLI_BRANCH" != "dev" ]; then
            echo "::warning::Invalid cli.branch '$CLI_BRANCH'. Falling back to 'main'."
            CLI_BRANCH="main"
          fi

          # Build list of unique patch repo+branch pairs
          REPO_PAIRS="$(jq -r '
            .patch_repos
            | to_entries
            | map(.value | "\(.repo)|\(.branch | ascii_downcase)")
            | unique[]
          ' config.json)"

          if [ -z "$REPO_PAIRS" ]; then
            echo "::error::No valid patch_repos entries found in config.json."
            exit 1
          fi

          resolve_release_tag() {
            local repo="$1"
            local branch="$2"
            local stable_tag=""
            local selected_tag=""

            stable_tag="$(gh release view --repo "$repo" --json tagName -q .tagName || true)"
            if [ "$branch" = "main" ]; then
              selected_tag="$stable_tag"
            else
              selected_tag="$(
                gh api "repos/${repo}/releases?per_page=100" --jq '
                  [ .[]
                    | select(
                        (.draft != true)
                        and (
                        ((.target_commitish // "" | ascii_downcase) == "dev")
                        or (.prerelease == true)
                        or ((.tag_name // "" | ascii_downcase | test("(^|[-_.])(dev|beta|alpha|rc)")))
                        )
                      )
                  ][0].tag_name // empty
                ' || true
              )"
              if [ -z "$selected_tag" ]; then
                echo "::warning::No dev-style release found for ${repo}; falling back to latest release tag."
                selected_tag="$stable_tag"
              fi
            fi

            if [ -z "$selected_tag" ]; then
              echo "::error::Could not resolve release tag for ${repo} (branch=${branch})."
              exit 1
            fi
            echo "$selected_tag"
          }

          # Resolve tag for each unique patch repo+branch pair
          declare -A REPO_TAGS
          while IFS='|' read -r repo branch; do
            echo "::notice::Resolving tag for ${repo} (branch=${branch})..."
            tag="$(resolve_release_tag "$repo" "$branch")"
            echo "::notice::  ${repo} -> ${tag}"
            REPO_TAGS["$repo"]="$tag"
          done <<< "$REPO_PAIRS"

          # Resolve CLI tag
          CLI_TAG="$(resolve_release_tag "$CLI_REPO" "$CLI_BRANCH")"
          echo "::notice::CLI (${CLI_REPO}) -> ${CLI_TAG}"

          # Build matrix-include JSON array
          MATRIX_INCLUDE="$(jq -c '
            .patch_repos
            | to_entries
            | map({
                name: .value.name,
                appId: .key,
                patchRepo: .value.repo,
                patchBranch: (.value.branch | ascii_downcase),
                patchSlug: (.value.repo | gsub("/"; "-"))
              })
          ' config.json)"

          # Inject resolved tags into matrix entries
          MATRIX_WITH_TAGS="$(
            echo "$MATRIX_INCLUDE" | jq -c \
              --argjson tags "$(
                for repo in "${!REPO_TAGS[@]}"; do
                  echo "{\"repo\":\"$repo\",\"tag\":\"${REPO_TAGS[$repo]}\"}"
                done | jq -sc 'map({(.repo): .tag}) | add // {}'
              )" '
              map(. + {patchTag: ($tags[.patchRepo] // "")})
            '
          )"

          # Guard: if matrix is empty (no apps configured), skip build
          if [ "$(echo "$MATRIX_WITH_TAGS" | jq 'length')" = "0" ]; then
            echo "::warning::No apps configured in patch_repos; skipping build."
            echo "should-build=false" >> "$GITHUB_OUTPUT"
            echo "matrix-include=[]" >> "$GITHUB_OUTPUT"
            echo "repo-versions={}" >> "$GITHUB_OUTPUT"
            echo "cli-version=$CLI_TAG" >> "$GITHUB_OUTPUT"
            echo "cli-branch=$CLI_BRANCH" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build repo-versions map (for state comparison and update-state)
          REPO_VERSIONS="$(
            for repo in "${!REPO_TAGS[@]}"; do
              echo "{\"repo\":\"$repo\",\"tag\":\"${REPO_TAGS[$repo]}\"}"
            done | jq -sc 'map({(.repo): .tag}) | add // {}'
          )"

          echo "matrix-include=$MATRIX_WITH_TAGS" >> "$GITHUB_OUTPUT"
          echo "repo-versions=$REPO_VERSIONS" >> "$GITHUB_OUTPUT"
          echo "cli-version=$CLI_TAG" >> "$GITHUB_OUTPUT"
          echo "cli-branch=$CLI_BRANCH" >> "$GITHUB_OUTPUT"

          # Load previous state — read new patches map; fall back to old flat keys for migration.
          PREV_REPO_VERSIONS="{}"
          PREV_CLI_VERSION="none"
          PREV_CLI_BRANCH_STATE="main"
          if [ -s state.json ] && jq -e 'type=="object"' state.json >/dev/null 2>&1; then
            PREV_CLI_VERSION="$(jq -r '.cli_version // "none"' state.json)"
            PREV_CLI_BRANCH_STATE="$(jq -r '.cli_branch // "main"' state.json)"
            if jq -e '.patches | type == "object"' state.json >/dev/null 2>&1; then
              # New repo-keyed structure
              PREV_REPO_VERSIONS="$(jq -c '.patches | map_values(.version)' state.json)"
            else
              # Old flat structure (pre-migration): treat as unknown versions
              echo "::notice::state.json uses old flat structure; treating patch versions as unknown (will trigger build)."
              PREV_REPO_VERSIONS="{}"
            fi
          else
            if [ -f state.json ]; then
              echo "::warning::state.json is missing or invalid JSON; using defaults."
            fi
          fi

          # Check if any repo version changed
          VERSION_CHANGED=false
          for repo in "${!REPO_TAGS[@]}"; do
            CURRENT_TAG="${REPO_TAGS[$repo]}"
            PREV_TAG="$(echo "$PREV_REPO_VERSIONS" | jq -r --arg r "$repo" '.[$r] // "none"')"
            if [ "$CURRENT_TAG" != "$PREV_TAG" ]; then
              echo "::notice::Patch version changed: ${repo}: ${PREV_TAG} -> ${CURRENT_TAG}"
              VERSION_CHANGED=true
            fi
          done

          if [ "$CLI_TAG" != "$PREV_CLI_VERSION" ] || [ "$CLI_BRANCH" != "$PREV_CLI_BRANCH_STATE" ]; then
            echo "::notice::CLI version changed: ${PREV_CLI_BRANCH_STATE}/${PREV_CLI_VERSION} -> ${CLI_BRANCH}/${CLI_TAG}"
            VERSION_CHANGED=true
          fi

          # Check if versions/channels changed
          if [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ]; then
            echo "should-build=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Manual run detected; forcing build."
          elif [ "$VERSION_CHANGED" = "true" ]; then
            echo "should-build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-build=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No version/channel changes detected. Skipping build."
          fi

      - name: Setup Node.js
        if: steps.version-check.outputs.should-build == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.version-check.outputs.should-build == 'true'
        run: npm ci

      - name: Cache Playwright browsers
        if: steps.version-check.outputs.should-build == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install Playwright browsers
        if: steps.version-check.outputs.should-build == 'true'
        run: npx playwright install chromium

      - name: Upload Playwright browsers for build jobs
        if: steps.version-check.outputs.should-build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-browsers
          path: ~/.cache/ms-playwright
          retention-days: 1

      - name: Cache apkeep
        id: cache-apkeep
        if: steps.version-check.outputs.should-build == 'true'
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/apkeep
          key: apkeep-${{ runner.os }}-v1

      - name: Install apkeep
        if: steps.version-check.outputs.should-build == 'true'
        run: |
          # Install apkeep for downloading APKs from APKPure
          APKEEP_VERSION="0.18.0"
          APKEEP_URL="https://github.com/EFForg/apkeep/releases/download/${APKEEP_VERSION}/apkeep-x86_64-unknown-linux-gnu"
          curl -sSL "$APKEEP_URL" -o /usr/local/bin/apkeep
          chmod +x /usr/local/bin/apkeep
          apkeep --version

      - name: Upload apkeep for build jobs
        if: steps.version-check.outputs.should-build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: apkeep-binary
          path: /usr/local/bin/apkeep
          retention-days: 1

      - name: Resolve latest APK versions from APKMirror
        if: steps.version-check.outputs.should-build == 'true'
        run: |
          set -euo pipefail

          CLI_TAG="${{ steps.version-check.outputs.cli-version }}"
          CLI_REPO="$(jq -r '.cli.repo' config.json)"
          REPO_VERSIONS='${{ steps.version-check.outputs.repo-versions }}'

          mkdir -p tools

          echo "::notice::Downloading morphe-cli ${CLI_TAG}..."
          gh release download "$CLI_TAG" --repo "$CLI_REPO" --pattern "*.jar" --clobber || true
          for f in *.jar; do
            [ -f "$f" ] && mv "$f" tools/morphe-cli.jar && echo "::notice::Moved $f to tools/morphe-cli.jar"
          done

          # Download .mpp for each unique patch repo (slug-named)
          REPO_PAIRS="$(jq -r '
            .patch_repos
            | to_entries
            | map(.value | "\(.repo)|\(.branch | ascii_downcase)")
            | unique[]
          ' config.json)"

          while IFS='|' read -r repo branch; do
            slug="${repo//\//-}"
            tag="$(echo "$REPO_VERSIONS" | jq -r --arg r "$repo" '.[$r] // empty')"
            if [ -z "$tag" ]; then
              echo "::error::No resolved tag for repo ${repo}. Cannot download .mpp."
              exit 1
            fi
            mpp_dest="tools/${slug}.mpp"
            if [ ! -f "$mpp_dest" ]; then
              echo "::notice::Downloading patches .mpp from ${repo}@${tag}..."
              gh release download "$tag" --repo "$repo" --pattern "patches-*.mpp" --dir tools >/dev/null
              # Rename the downloaded .mpp to slug-named file
              for f in tools/patches-*.mpp; do
                [ -f "$f" ] && mv "$f" "$mpp_dest" && echo "::notice::Saved as ${mpp_dest}"
                break
              done
            else
              echo "::notice::Using existing ${mpp_dest}"
            fi
          done <<< "$REPO_PAIRS"

          if [ ! -f tools/morphe-cli.jar ]; then
            echo "::warning::morphe-cli.jar not found; skipping APK version resolution."
            exit 0
          fi

      - name: Cache morphe-cli and patches
        if: steps.version-check.outputs.should-build == 'true'
        uses: actions/cache@v4
        with:
          path: |
            tools/morphe-cli.jar
            tools/*.mpp
          key: morphe-tools-cli-${{ steps.version-check.outputs.cli-version }}-repos-${{ hashFiles('config.json') }}
          restore-keys: |
            morphe-tools-cli-${{ steps.version-check.outputs.cli-version }}-
            morphe-tools-

      - name: Download APKs using unified-downloader
        id: download-apks
        if: steps.version-check.outputs.should-build == 'true'
        run: |
          set -euo pipefail

          # Install aapt for version validation in unified-downloader
          if ! command -v aapt &> /dev/null; then
            echo "::notice::Installing aapt for version validation..."
            mkdir -p /tmp/android-sdk
            curl -sSL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/android-sdk
            mkdir -p /tmp/android-sdk/cmdline-tools/latest
            mv /tmp/android-sdk/cmdline-tools/* /tmp/android-sdk/cmdline-tools/latest/ 2>/dev/null || true
            export ANDROID_HOME=/tmp/android-sdk
            export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin"
          fi

          RESULTS_FILE="$RUNNER_TEMP/download_results.json"
          echo "[]" > "$RESULTS_FILE"

          while IFS= read -r PKG; do
              PATCH_REPO="$(jq -r --arg pkg "$PKG" '.patch_repos[$pkg].repo // empty' config.json)"
              PATCH_SLUG="${PATCH_REPO//\//-}"
              MPP_FILE="tools/${PATCH_SLUG}.mpp"

              if [ -z "$PATCH_REPO" ] || [ ! -f "$MPP_FILE" ]; then
                echo "::warning::No .mpp available for $PKG (repo=${PATCH_REPO:-unset}); skipping version resolution."
                continue
              fi

              # morphe-cli list-versions reads tools/patches.mpp by default; swap in the right .mpp
              cp "$MPP_FILE" tools/patches.mpp
              echo "Getting supported version for $PKG..."
              VERSIONS_OUTPUT=$(java -jar tools/morphe-cli.jar list-versions "$PKG" 2>/dev/null || echo "")
              echo "::debug::morphe-cli output for $PKG: $VERSIONS_OUTPUT"

              LATEST_VERSION=$(echo "$VERSIONS_OUTPUT" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)
              echo "::debug::Extracted version for $PKG: $LATEST_VERSION"

              if [ -z "$LATEST_VERSION" ]; then
                echo "Could not determine version for $PKG, skipping..."
                continue
              fi

              echo "Downloading $PKG version $LATEST_VERSION..."

              APK_DIR="tools/apks"
              mkdir -p "$APK_DIR"

              RESULT=$(node .github/scripts/unified-downloader.js "$PKG" "$LATEST_VERSION" "$APK_DIR" 2>&1) || true
              echo "::debug::unified-downloader result for $PKG: $RESULT"

              if echo "$RESULT" | jq -e '.success' >/dev/null 2>&1; then
                FILEPATH=$(echo "$RESULT" | jq -r '.filepath')
                SOURCE=$(echo "$RESULT" | jq -r '.source')
                echo "Downloaded $PKG via $SOURCE: $FILEPATH"

                # Instead of calling update-download-urls here, save to temp file
                URL=$(echo "$RESULT" | jq -r '.url // empty')
                if [ -n "$URL" ] && [ "$URL" != "null" ]; then
                  echo "RESULT:$PKG:$LATEST_VERSION:$URL" >> "$RESULTS_FILE.tmp"
                fi
              else
                echo "Failed to download $PKG: $RESULT"
              fi
          done < <(jq -r '.patch_repos | keys[]' config.json)

          # Now process sequentially
          if [ -f "$RESULTS_FILE.tmp" ]; then
            while IFS=: read -r pkg ver url; do
              node .github/scripts/update-download-urls.js "$pkg" "$ver" "$url" || true
            done < "$RESULTS_FILE.tmp"
          fi

      - name: Upload downloaded APKs
        if: steps.version-check.outputs.should-build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: pre-downloaded-apks
          path: tools/apks/*.apk tools/apks/*.xapk tools/apks/*.apkm tools/apks/*.apks 2>/dev/null || true
          retention-days: 1

  build:
    needs: check-versions
    if: needs.check-versions.outputs.should-build == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.check-versions.outputs.matrix-include) }}

    env:
      # Where we'll put tools/artifacts
      GH_TOKEN: ${{ github.token }}
      TOOLS_DIR: tools
      APKS_DIR: apps
      OUT_DIR: out
      PATCH_REPO: ${{ matrix.patchRepo }}
      PATCH_BRANCH: ${{ matrix.patchBranch }}
      PATCH_TAG: ${{ matrix.patchTag }}
      PATCH_SLUG: ${{ matrix.patchSlug }}
      CLI_VERSION: ${{ needs.check-versions.outputs.cli-version }}
      CLI_BRANCH: ${{ needs.check-versions.outputs.cli-branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (for morphe-cli)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17" # any current LTS JRE is fine to run the CLI [9](https://aur.archlinux.org/packages/morphe-cli)

      - name: Verify dependencies
        id: deps
        run: |
          set -euo pipefail

          echo "::notice::Verifying available tools..."

          # Check for required tools (ubuntu-latest has these pre-installed)
          for tool in curl jq unzip; do
            if command -v "$tool" &> /dev/null; then
              echo "✓ $tool found: $(which $tool)"
            else
              echo "::error::$tool not found"
              exit 1
            fi
          done

          echo "::notice::All dependencies verified"

      - name: Install BouncyCastle for signing
        run: |
          set -euo pipefail
          echo "::notice::Installing BouncyCastle for APK signing..."

          # Create a directory for the JAR
          mkdir -p /tmp/bouncycastle

          # Download BouncyCastle directly (it's a well-known stable JAR)
          BCOPS_VERSION="1.77"
          BCOPS_URL="https://repo1.maven.org/maven2/org/bouncycastle/bcprov-jdk18on/$BCOPS_VERSION/bcprov-jdk18on-$BCOPS_VERSION.jar"
          BCPROV_JAR="/tmp/bouncycastle/bcprov.jar"

          echo "Downloading BouncyCastle from Maven Central..."
          if curl -sSL "$BCOPS_URL" -o "$BCPROV_JAR"; then
            echo "✓ BouncyCastle downloaded: $BCPROV_JAR"
            # Also copy to where the signing step expects it
            mkdir -p /usr/share/java
            cp "$BCPROV_JAR" /usr/share/java/bcprov.jar
            echo "✓ Copied to /usr/share/java/bcprov.jar"
          else
            echo "::error::Failed to download BouncyCastle"
            exit 1
          fi

      - name: Download apkeep from check-versions
        uses: actions/download-artifact@v4
        with:
          name: apkeep-binary
          path: /usr/local/bin
        continue-on-error: true

      - name: Ensure apkeep is executable
        run: |
          if [ -f /usr/local/bin/apkeep ]; then
            chmod +x /usr/local/bin/apkeep
            apkeep --version
          else
            # Download failed, try cache
            echo "apkeep not found in artifact, will try cache"
            exit 1
          fi

      - name: Cache apkeep (fallback)
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/apkeep
          key: apkeep-${{ runner.os }}-v1

      - name: Install apkeep (fallback)
        run: |
          if [ -f /usr/local/bin/apkeep ]; then
            echo "Using existing apkeep"
          else
            echo "Installing apkeep..."
            APKEEP_VERSION="0.18.0"
            APKEEP_URL="https://github.com/EFForg/apkeep/releases/download/${APKEEP_VERSION}/apkeep-x86_64-unknown-linux-gnu"
            curl -sSL "$APKEEP_URL" -o /usr/local/bin/apkeep
            chmod +x /usr/local/bin/apkeep
            apkeep --version
          fi

      - name: Prepare dirs
        run: |
          mkdir -p "$TOOLS_DIR" "$APKS_DIR" "$OUT_DIR"

      - name: Download pre-downloaded APKs from check-versions
        uses: actions/download-artifact@v4
        with:
          name: pre-downloaded-apks
          path: "${{ env.TOOLS_DIR }}"
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: npm ci

      - name: Download Playwright browsers from check-versions
        uses: actions/download-artifact@v4
        with:
          name: playwright-browsers
          path: ~/.cache/ms-playwright
        continue-on-error: true

      - name: Install Playwright browsers (fallback if artifact not available)
        run: |
          # Restore execute permissions lost during artifact upload/download
          find ~/.cache/ms-playwright -name 'chrome-headless-shell' -o -name 'chrome' 2>/dev/null | xargs -r chmod +x
          # Install if not present at all
          if ! find ~/.cache/ms-playwright -name 'chrome-headless-shell' 2>/dev/null | grep -q .; then
            npx playwright install chromium
          fi

      - name: Cache patches .mpp
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLS_DIR }}/${{ matrix.patchSlug }}.mpp
          key: morphe-patches-${{ matrix.patchSlug }}-${{ matrix.patchTag }}
          restore-keys: |
            morphe-patches-${{ matrix.patchSlug }}-

      - name: Cache morphe-cli
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLS_DIR }}/morphe-cli.jar
          key: morphe-cli-${{ needs.check-versions.outputs.cli-version }}
          restore-keys: |
            morphe-cli-

      - name: Get latest Morphe patches + CLI + APKEditor
        id: morphe
        run: |
          set -euo pipefail

          # Validate required env vars
          if [ -z "${PATCH_REPO:-}" ] || [ -z "${PATCH_TAG:-}" ] || [ -z "${PATCH_SLUG:-}" ]; then
            echo "::error::PATCH_REPO/PATCH_TAG/PATCH_SLUG not set. Check check-versions matrix output."
            exit 1
          fi

          CLI_TAG="${CLI_VERSION}"
          if [ -z "$CLI_TAG" ]; then
            echo "::error::Missing CLI release version. cli='$CLI_TAG'"
            exit 1
          fi

          MPP_DEST="$TOOLS_DIR/${PATCH_SLUG}.mpp"

          # Download .mpp if not cached
          if [ ! -f "$MPP_DEST" ]; then
            echo "::notice::Downloading patches from ${PATCH_REPO}@${PATCH_TAG}..."
            gh release download "$PATCH_TAG" \
              --repo "$PATCH_REPO" \
              --pattern 'patches-*.mpp' \
              --dir "$TOOLS_DIR" >/dev/null
            # Rename to slug-named file
            for f in "$TOOLS_DIR"/patches-*.mpp; do
              [ -f "$f" ] && mv "$f" "$MPP_DEST" && echo "::notice::Saved as ${MPP_DEST}"
              break
            done
          else
            echo "::notice::Using cached ${MPP_DEST}"
          fi

          if [ ! -f "$MPP_DEST" ]; then
            echo "::error::Failed to obtain ${MPP_DEST} from ${PATCH_REPO}@${PATCH_TAG}."
            exit 1
          fi
          echo "patches_tag=${PATCH_TAG}" >> "$GITHUB_OUTPUT"

          # Always fetch patches-list.json (small file, always needed)
          curl -fsSL "https://raw.githubusercontent.com/${PATCH_REPO}/${PATCH_TAG}/patches-list.json" \
            -o "$TOOLS_DIR/patches-list.json"

          if [ ! -f "$TOOLS_DIR/morphe-cli.jar" ]; then
            echo "cli_tag=$CLI_TAG" >> "$GITHUB_OUTPUT"
            gh release download "$CLI_TAG" \
              --repo MorpheApp/morphe-cli \
              --pattern 'morphe-cli-*-all.jar' \
              --dir "$TOOLS_DIR" >/dev/null
          else
            echo "cli_tag=$CLI_TAG" >> "$GITHUB_OUTPUT"
            echo "::notice::Using cached morphe-cli.jar"
          fi

          # Download APKEditor for split APK merge (.xapk/.apkm/.apks -> standalone .apk).
          APKEDITOR_TAG="$(gh release view --repo REAndroid/APKEditor --json tagName -q .tagName)"
          APKEDITOR_ASSET="$(
            gh release view "$APKEDITOR_TAG" --repo REAndroid/APKEditor --json assets \
              -q '.assets[] | select(.name | endswith(".jar")) | .name' \
              | head -n1
          )"
          if [ -z "$APKEDITOR_ASSET" ]; then
            echo "::error::Could not find APKEditor .jar asset on release ${APKEDITOR_TAG}."
            exit 1
          fi
          gh release download "$APKEDITOR_TAG" \
            --repo REAndroid/APKEditor \
            --pattern "$APKEDITOR_ASSET" \
            --dir "$TOOLS_DIR" >/dev/null

          APKEDITOR_JAR_PATH="$TOOLS_DIR/$APKEDITOR_ASSET"
          if [ ! -f "$APKEDITOR_JAR_PATH" ]; then
            echo "::error::APKEditor download failed: $APKEDITOR_JAR_PATH"
            exit 1
          fi
          echo "apkeditor_jar=$APKEDITOR_JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "::notice::Downloaded APKEditor ${APKEDITOR_TAG}: ${APKEDITOR_ASSET}"

      - name: Resolve supported version for ${{ matrix.appId }}
        id: targetver
        run: |
          set -euo pipefail

          DISABLED_PATCHES_JSON="$(jq -c \
            --arg repo "$PATCH_REPO" \
            --arg pkg "${{ matrix.appId }}" \
            '.[$repo][$pkg] // {} | to_entries | map(select(.value == false) | .key)' \
            patches.json 2>/dev/null || echo '[]')"

          STRICT_VERSIONS="$(
            jq -r \
              --arg pkg "${{ matrix.appId }}" \
              --argjson disabled "$DISABLED_PATCHES_JSON" \
              '
              (.patches // .)
              | map(
                  select(
                    ((.use // true) == true)
                    and ((.name as $n | ($disabled | index($n)) | not))
                    and ((.compatiblePackages[$pkg]? | type) == "array")
                  )
                )
              | map(.compatiblePackages[$pkg]) as $version_lists
              | if ($version_lists | length) == 0 then
                  empty
                else
                  reduce $version_lists[] as $current ($version_lists[0];
                    map(select($current | index(.)))
                  ) | .[]
                end
              ' "$TOOLS_DIR/patches-list.json" || true
          )"

          VERSION_COUNTS="$(
            jq -r \
              --arg pkg "${{ matrix.appId }}" \
              --argjson disabled "$DISABLED_PATCHES_JSON" \
              '
              (.patches // .) as $patches
              | $patches
              | map(
                  select(
                    ((.use // true) == true)
                    and ((.name as $n | ($disabled | index($n)) | not))
                    and ((.compatiblePackages[$pkg]? | type) == "array")
                  )
                )
              | map(.compatiblePackages[$pkg][])
              | sort
              | group_by(.)
              | map([length, .[0]])
              | .[]
              | @tsv
              ' "$TOOLS_DIR/patches-list.json" || true
          )"

          TARGET_VERSION=""
          TARGET_VERSIONS=""
          if [ -n "$STRICT_VERSIONS" ]; then
            TARGET_VERSIONS="$(printf '%s\n' "$STRICT_VERSIONS" | sort -Vr | paste -sd, -)"
            TARGET_VERSION="$(printf '%s\n' "$STRICT_VERSIONS" | sort -Vr | head -n1)"
          elif [ -n "$VERSION_COUNTS" ]; then
            TARGET_VERSIONS="$(printf '%s\n' "$VERSION_COUNTS" | sort -t $'\t' -k1,1nr -k2,2Vr | cut -f2 | paste -sd, -)"
            TARGET_VERSION="$(printf '%s\n' "$VERSION_COUNTS" | sort -t $'\t' -k1,1nr -k2,2Vr | head -n1 | cut -f2)"
          fi

          if [ -n "$TARGET_VERSION" ]; then
            echo "version=$TARGET_VERSION" >> "$GITHUB_OUTPUT"
            echo "versions=$TARGET_VERSIONS" >> "$GITHUB_OUTPUT"
            echo "Selected version for ${{ matrix.appId }}: $TARGET_VERSION (URL resolved in check-versions)"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "versions=" >> "$GITHUB_OUTPUT"
            echo "::error::Could not resolve a Morphe-supported version from patches list."
            exit 1
          fi

      - name: Cache APK for ${{ matrix.appId }}
        id: cache-apk
        uses: actions/cache@v4
        with:
          path: ${{ env.APKS_DIR }}
          key: apk-${{ matrix.appId }}-${{ steps.targetver.outputs.version }}
          restore-keys: apk-${{ matrix.appId }}-

      - name: Download supported APK for ${{ matrix.appId }}
        id: getapk
        run: |
          set -euo pipefail

          echo "::notice::Downloading APK for ${{ matrix.appId }}..."
          APP_ID="${{ matrix.appId }}"
          TARGET_VERSION="${{ steps.targetver.outputs.version }}"
          TARGET_VERSIONS="${{ steps.targetver.outputs.versions }}"
          APKEDITOR_JAR="${{ steps.morphe.outputs.apkeditor_jar }}"

          # Create output directory if it doesn't exist
          mkdir -p "$APKS_DIR"

          # Check if a cached APK matching the target version is already present
          DOWNLOAD_SUCCESS=false
          CACHED_APK=""
          for ext in apk xapk apkm apks; do
            while IFS= read -r apk; do
              [ -z "$apk" ] && continue
              apk_ver=$(basename "$apk" | grep -oE '[0-9]+(\.[0-9]+){2,}' | head -n1 || true)
              if [ "$apk_ver" = "$TARGET_VERSION" ]; then
                CACHED_APK="$apk"
                break 2
              fi
            done < <(find "$APKS_DIR" -maxdepth 1 -type f -name "*.$ext" 2>/dev/null || true)
          done

          if [ -n "$CACHED_APK" ]; then
            echo "::notice::Using cached APK: $CACHED_APK (v$TARGET_VERSION)"
            DOWNLOAD_SUCCESS=true
          else
            rm -f "$APKS_DIR"/* || true
          fi

          # Manual source URL override (fallback).
          # config.json shape:
          # {
          #   "download_urls": {
          #     "com.google.android.youtube": {
          #       "latest_supported": "https://www.apkmirror.com/apk/.../android-apk-download/"
          #     }
          #   }
          # }
          MANUAL_URL="$(
            jq -r \
              --arg pkg "$APP_ID" \
              '
                .download_urls?[$pkg]?["latest_supported"]
                // empty
              ' config.json 2>/dev/null || true
          )"
          
          find_package_candidate() {
            find "$APKS_DIR" -type f \
              \( -name "*.apk" -o -name "*.xapk" -o -name "*.apkm" -o -name "*.apks" \) \
              -printf '%p\n' \
              | awk '
                  function lower(s){ return tolower(s) }
                  function score(path, n, ext, s) {
                    n = lower(path)
                    ext = n
                    sub(/^.*\./, "", ext)
                    s = 0
                    if (ext == "apk") s += 2000
                    else if (ext == "xapk" || ext == "apkm" || ext == "apks") s += 500
                    if (n ~ /\/base\.apk$/) s += 500
                    if (n ~ /arm64-v8a|arm64_v8a|arm64/) s += 800
                    if (n ~ /x86_64|x86/) s -= 600
                    if (n ~ /armeabi-v7a|arm-v7a|v7a/) s -= 300
                    if (n ~ /split_config|(^|\/)config\./) s -= 1400
                    return s
                  }
                  {
                    s = score($0)
                    if (best == "" || s > bests) {
                      best = $0
                      bests = s
                    }
                  }
                  END { if (best != "") print best }
                ' || true
          }

          apk_has_dex() {
            local apk="$1"
            unzip -Z1 "$apk" 2>/dev/null | grep -Eq '^classes([0-9]+)?\.dex$'
          }

          merge_split_package_with_apkeditor() {
            local split_pkg="$1"
            local out_apk="$2"
            local merge_log="$RUNNER_TEMP/apkeditor_merge_${{ matrix.name }}.log"
            if [ -z "${APKEDITOR_JAR}" ] || [ ! -f "${APKEDITOR_JAR}" ]; then
              echo "::warning::APKEditor jar not available; cannot merge split package."
              return 1
            fi

            rm -f "$out_apk"
            echo "::notice::Merging split package with APKEditor: $split_pkg"
            set +e
            java -jar "${APKEDITOR_JAR}" m -i "$split_pkg" -o "$out_apk" >"$merge_log" 2>&1
            local rc=$?
            set -e
            if [ "$rc" -eq 0 ] && [ ! -f "$out_apk" ]; then
              # Some APKEditor versions ignore -o and emit *_merged.apk next to input.
              local default_merged="${split_pkg%.*}_merged.apk"
              local fallback_merged
              fallback_merged="$(find "$(dirname "$split_pkg")" -maxdepth 1 -type f -name "*_merged.apk" -printf '%p\n' | head -n1 || true)"
              if [ -f "$default_merged" ]; then
                mv -f "$default_merged" "$out_apk"
              elif [ -n "$fallback_merged" ] && [ -f "$fallback_merged" ]; then
                mv -f "$fallback_merged" "$out_apk"
              fi
            fi

            if [ "$rc" -ne 0 ] || [ ! -f "$out_apk" ]; then
              echo "::warning::APKEditor merge failed for $split_pkg"
              cat "$merge_log" || true
              return 1
            fi

            if ! apk_has_dex "$out_apk"; then
              echo "::warning::APKEditor output has no classes.dex: $out_apk"
              return 1
            fi
            return 0
          }

          best_ranked_apk_in_dir() {
            local dir="$1"
            find "$dir" -type f -name "*.apk" -printf '%p\n' \
              | awk '
                  function lower(s){ return tolower(s) }
                  function score(path, n, b, s) {
                    n = lower(path)
                    b = n
                    sub(/^.*\//, "", b)
                    s = 0
                    if (b == "base.apk") s += 500
                    if (n ~ /arm64-v8a|arm64_v8a|arm64/) s += 800
                    if (n ~ /x86_64|x86/) s -= 600
                    if (n ~ /armeabi-v7a|arm-v7a|v7a/) s -= 300
                    if (n ~ /split_config|(^|\/)config\./) s -= 1400
                    return s
                  }
                  { print score($0), $0 }
                ' | sort -nr | cut -d' ' -f2-
          }

          download_with_playwright() {
            local url="$1"
            
            if [ -z "$url" ]; then
              echo "::error::Playwright download URL is empty."
              return 1
            fi
            
            echo "::notice::Downloading APK using Playwright..."
            
            # Determine output filename from URL
            local apk_name="${url##*/}"
            apk_name="${apk_name%/}"
            [ -z "$apk_name" ] && apk_name="${APP_ID}.apk"
            
            case "${apk_name,,}" in
              *.apk|*.xapk|*.apkm|*.apks) ;;
              *) apk_name="${apk_name}.apk" ;;
            esac
            
            # Delegate to curl downloader with the pre-resolved URL
            download_with_curl "$url"
          }

          download_with_curl() {
            local url="$1"
            local attempt=1
            local max_attempts=4

            if [ -z "$url" ]; then
              echo "::error::Manual APKMirror URL is empty."
              return 1
            fi

            echo "::notice::Using APK source URL for ${APP_ID}: $url"
            
            # Determine output filename from URL
            local apk_name="${url##*/}"
            # Remove trailing slash and clean up
            apk_name="${apk_name%/}"
            [ -z "$apk_name" ] && apk_name="${APP_ID}.apk"
            
            # Ensure .apk extension
            case "${apk_name,,}" in
              *.apk|*.xapk|*.apkm|*.apks) ;;
              *) apk_name="${apk_name}.apk" ;;
            esac

            local output_file="$APKS_DIR/$apk_name"

            # Download with curl, following redirects
            while [ "$attempt" -le "$max_attempts" ]; do
              echo "::notice::Download attempt ${attempt}/${max_attempts}..."
              
              if curl -fL --retry 4 --retry-delay 5 --connect-timeout 30 \
                -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36" \
                -H "Accept: */*" \
                -H "Accept-Language: en-US,en;q=0.9" \
                -H "Referer: https://www.apkmirror.com/" \
                -o "$output_file" \
                "$url"; then
                
                # Check if we got a valid file (not an error page)
                if [ -s "$output_file" ] && [ "$(stat -c%s "$output_file" 2>/dev/null || echo 0)" -gt 1000 ]; then
                  echo "::notice::Download saved: $output_file"
                  return 0
                fi
              fi
              
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "::warning::Download failed after ${max_attempts} attempts."
                rm -f "$output_file"
                return 1
              fi
              
              echo "::warning::Download attempt ${attempt} failed, retrying..."
              sleep $((attempt * 10))
              rm -f "$output_file"
              attempt=$((attempt + 1))
            done
            
            return 1
          }

          APK_CANDIDATE=""
          if [ -z "$TARGET_VERSION" ]; then
            echo "::error::No latest Morphe-supported version was resolved for ${{ matrix.appId }}."
            exit 1
          fi

          DOWNLOAD_SUCCESS=false

          # Install aapt BEFORE downloading - needed for version validation in unified-downloader
          if ! command -v aapt &> /dev/null; then
            echo "::notice::Installing aapt for version validation..."
            mkdir -p /tmp/android-sdk
            curl -sSL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/android-sdk
            mkdir -p /tmp/android-sdk/cmdline-tools/latest
            mv /tmp/android-sdk/cmdline-tools/* /tmp/android-sdk/cmdline-tools/latest/ 2>/dev/null || true
            export ANDROID_HOME=/tmp/android-sdk
            export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin"
          fi

          # First, check if we have a pre-downloaded APK from check-versions job that matches target version
          PRELOADED_APK=""
          for ext in apk xapk apkm apks; do
            # Find APKs and check if version in filename matches target version
            while IFS= read -r apk; do
              [ -z "$apk" ] && continue
              # Extract version from filename (e.g., youtube-20.44.38.apk -> 20.44.38)
              apk_name=$(basename "$apk")
              apk_version=$(echo "$apk_name" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1 || true)
              if [ "$apk_version" = "$TARGET_VERSION" ]; then
                PRELOADED_APK="$apk"
                break 2
              fi
            done < <(find "$TOOLS_DIR" -type f -name "*.$ext" -printf '%p\n' 2>/dev/null || true)
          done

          if [ -n "$PRELOADED_APK" ] && [ -f "$PRELOADED_APK" ]; then
            echo "::notice::Using pre-downloaded APK from check-versions: $PRELOADED_APK (matches v$TARGET_VERSION)"
            cp "$PRELOADED_APK" "$APKS_DIR/"
            DOWNLOAD_SUCCESS=true
          else
            # Try unified-downloader.js to download the specific version
            echo "::notice::No matching APK found for v$TARGET_VERSION, using unified-downloader..."
            if RESULT=$(node .github/scripts/unified-downloader.js "$APP_ID" "$TARGET_VERSION" "$APKS_DIR" 2>&1); then
              echo "::notice::unified-downloader succeeded: $RESULT"
              DOWNLOAD_SUCCESS=true
            else
              echo "::warning::unified-downloader failed: $RESULT"

              # Fallback to manual URL if provided
              if [ -n "$MANUAL_URL" ]; then
                echo "::notice::Trying manual URL fallback..."
                if download_with_playwright "$MANUAL_URL"; then
                  DOWNLOAD_SUCCESS=true
                elif download_with_curl "$MANUAL_URL"; then
                  DOWNLOAD_SUCCESS=true
                fi
              fi
            fi
          fi
          fi  # end: no cached APK

          if [ "$DOWNLOAD_SUCCESS" = false ]; then
            echo "::error::No APK could be downloaded for $APP_ID version $TARGET_VERSION."
            exit 1
          fi

          # Validate downloaded APK has correct version using aapt
          echo "::notice::Validating APK version matches target v$TARGET_VERSION using aapt..."

          # Ensure aapt is available (comes with android-sdk or can be installed)
          if ! command -v aapt &> /dev/null; then
            echo "::notice::Installing aapt..."
            mkdir -p /tmp/android-sdk
            curl -sSL "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/android-sdk
            mkdir -p /tmp/android-sdk/cmdline-tools/latest
            mv /tmp/android-sdk/cmdline-tools/* /tmp/android-sdk/cmdline-tools/latest/ 2>/dev/null || true
            export ANDROID_HOME=/tmp/android-sdk
            export PATH="$PATH:$ANDROID_HOME/cmdline-tools/latest/bin"
          fi

          # Find and validate all APK files
          APK_VALID=false
          for apk_file in "$APKS_DIR"/*.apk; do
            [ -f "$apk_file" ] || continue

            # Get actual version from APK using aapt
            apk_info=$(aapt dump badging "$apk_file" 2>/dev/null || echo "")
            apk_version=$(echo "$apk_info" | grep -oP "versionName='\K[^']+" | head -n1 || true)
            apk_version_code=$(echo "$apk_info" | grep -oP "versionCode='\K[^']+" | head -n1 || true)

            echo "::debug::APK: $(basename "$apk_file") -> versionName=$apk_version, versionCode=$apk_version_code"

            # Compare versionName with target version
            if [ "$apk_version" = "$TARGET_VERSION" ]; then
              echo "::notice::APK version validated: $(basename "$apk_file") is v$apk_version (matches target)"
              APK_VALID=true
              break
            elif [ -z "$apk_version" ]; then
              # aapt couldn't read the version (not installed or unsupported format)
              # unified-downloader already validated the version, so accept the APK
              echo "::warning::Could not read APK version via aapt (aapt unavailable); trusting unified-downloader validation"
              APK_VALID=true
              break
            else
              echo "::warning::APK has wrong version: $(basename "$apk_file") is v$apk_version but wanted v$TARGET_VERSION - removing"
              rm -f "$apk_file"
            fi
          done

          # Also check xapk/apkm/apks files
          if [ "$APK_VALID" = false ]; then
            for apk_file in "$APKS_DIR"/*.{xapk,apkm,apks}; do
              [ -f "$apk_file" ] || continue
              echo "::notice::Checking split package: $(basename "$apk_file")"

              # For split packages, extract base APK and validate version before merge
              if command -v aapt &> /dev/null; then
                # Try to find the base APK inside the split package
                temp_dir="$RUNNER_TEMP/split_validate_$$"
                mkdir -p "$temp_dir"
                if unzip -q "$apk_file" "base.apk" -d "$temp_dir" 2>/dev/null; then
                  base_apk="$temp_dir/base.apk"
                  if [ -f "$base_apk" ]; then
                    split_info=$(aapt dump badging "$base_apk" 2>/dev/null || echo "")
                    split_version=$(echo "$split_info" | grep -oP "versionName='\K[^']+" | head -n1 || true)
                    echo "::debug::Split package base APK version: $split_version (expected: $TARGET_VERSION)"
                    if [ -n "$split_version" ] && [ "$split_version" != "$TARGET_VERSION" ]; then
                      echo "::warning::Split package has wrong version: $split_version (expected $TARGET_VERSION) - removing"
                      rm -f "$apk_file"
                      rm -rf "$temp_dir"
                      continue
                    fi
                    echo "::notice::Split package version validated: $split_version"
                  fi
                fi
                rm -rf "$temp_dir"
              fi

              # For split packages, we'll validate after merge
              APK_VALID=true
              break
            done
          fi

          if [ "$APK_VALID" = false ]; then
            echo "::error::No APK found with correct version v$TARGET_VERSION"
            echo "::notice::Files in $APKS_DIR:"
            ls -la "$APKS_DIR" || true
            exit 1
          fi

          APK_CANDIDATE="$(find_package_candidate)"

          if [ -z "$APK_CANDIDATE" ]; then
            echo "::error::No package downloaded for latest Morphe-supported version $TARGET_VERSION for ${{ matrix.appId }}."
            echo "::notice::All compatible versions (for reference): $TARGET_VERSIONS"
            exit 1
          fi

          if [ ! -f "$APK_CANDIDATE" ]; then
            echo "::error::Resolved package path is missing: $APK_CANDIDATE"
            echo "::notice::Files in $APKS_DIR:"
            ls -la "$APKS_DIR" || true
            exit 1
          fi
          echo "::notice::Found package in $APKS_DIR: $APK_CANDIDATE"

          # If an APK was selected directly, ensure it contains dex classes and is not a split-only config APK.
          if [[ "$APK_CANDIDATE" == *.apk ]] && ! apk_has_dex "$APK_CANDIDATE"; then
            echo "::warning::Selected APK does not contain classes.dex; trying another APK candidate."
            ALT_APK="$(best_ranked_apk_in_dir "$APKS_DIR")"
            while IFS= read -r candidate; do
              [ -z "$candidate" ] && continue
              if apk_has_dex "$candidate"; then
                APK_CANDIDATE="$candidate"
                echo "::notice::Using APK with dex content: $APK_CANDIDATE"
                break
              fi
            done <<< "$ALT_APK"
          fi

          # If we still have a dex-less APK candidate, prefer any split package and merge it.
          if [[ "$APK_CANDIDATE" == *.apk ]] && ! apk_has_dex "$APK_CANDIDATE"; then
            SPLIT_FOUND="$(find "$APKS_DIR" -maxdepth 1 -type f \( -name "*.xapk" -o -name "*.apkm" -o -name "*.apks" \) | head -n1 || true)"
            if [ -n "$SPLIT_FOUND" ]; then
              echo "::warning::Switching to split package for merge: $SPLIT_FOUND"
              APK_CANDIDATE="$SPLIT_FOUND"
            fi
          fi

          # If downloader produced split package (.xapk/.apkm/.apks), merge to an installable APK.
          APK_PATH="$APK_CANDIDATE"
          case "$APK_CANDIDATE" in
            *.xapk|*.apkm|*.apks)
              echo "::notice::Split package detected ($APK_CANDIDATE); attempting APKEditor merge..."
              APK_PATH="$APKS_DIR/${{ matrix.appId }}.apk"
              if merge_split_package_with_apkeditor "$APK_CANDIDATE" "$APK_PATH"; then
                echo "::notice::Merged APK created: $APK_PATH"
                # Validate merged APK version
                echo "::notice::Validating merged APK version..."
                if command -v aapt &> /dev/null; then
                  merged_info=$(aapt dump badging "$APK_PATH" 2>/dev/null || echo "")
                  merged_version=$(echo "$merged_info" | grep -oP "versionName='\K[^']+" | head -n1 || true)
                  echo "::debug::Merged APK version: $merged_version (expected: $TARGET_VERSION)"
                  if [ -n "$merged_version" ] && [ "$merged_version" != "$TARGET_VERSION" ]; then
                    echo "::error::Merged APK has wrong version: $merged_version (expected $TARGET_VERSION)"
                    exit 1
                  fi
                fi
              else
                echo "::warning::APKEditor merge failed; falling back to direct APK extraction."
                XAPK_TMP="$RUNNER_TEMP/xapk_${{ matrix.name }}"
                rm -rf "$XAPK_TMP"
                mkdir -p "$XAPK_TMP"
                unzip -o -q "$APK_CANDIDATE" '*.apk' -d "$XAPK_TMP" || true

                # Prefer arm64-v8a APK names, but only if the APK contains dex content.
                EXTRACTED_APK=""
                while IFS= read -r candidate; do
                  [ -z "$candidate" ] && continue
                  if apk_has_dex "$candidate"; then
                    EXTRACTED_APK="$candidate"
                    break
                  fi
                done < <(best_ranked_apk_in_dir "$XAPK_TMP")
                if [ -z "$EXTRACTED_APK" ]; then
                  # Last fallback: largest dex-bearing APK in archive.
                  while IFS= read -r candidate; do
                    [ -z "$candidate" ] && continue
                    if apk_has_dex "$candidate"; then
                      EXTRACTED_APK="$candidate"
                      break
                    fi
                  done < <(find "$XAPK_TMP" -type f -name "*.apk" -printf '%s %p\n' | sort -nr | cut -d' ' -f2-)
                fi

                if [ -z "$EXTRACTED_APK" ] || [ ! -f "$EXTRACTED_APK" ]; then
                  echo "::error::Could not extract APK from split package: $APK_CANDIDATE"
                  echo "::notice::Archive APK contents:"
                  find "$XAPK_TMP" -type f -name "*.apk" -print || true
                  exit 1
                fi

                cp "$EXTRACTED_APK" "$APK_PATH"
                echo "::notice::Extracted APK: $APK_PATH (from $(basename "$EXTRACTED_APK"))"
              fi
              ;;
          esac

          if [ ! -f "$APK_PATH" ]; then
            echo "::error::APK path check failed: $APK_PATH"
            exit 1
          fi

          if ! apk_has_dex "$APK_PATH"; then
            echo "::error::Chosen APK has no classes.dex and cannot be patched: $APK_PATH"
            echo "::notice::Files in $APKS_DIR:"
            find "$APKS_DIR" -type f \( -name "*.apk" -o -name "*.xapk" -o -name "*.apkm" -o -name "*.apks" \) -print || true
            exit 1
          fi
          
          echo "apk=$APK_PATH" >> "$GITHUB_OUTPUT"
          
          # Extract version from APK filename
          APK_FILENAME=$(basename "$APK_PATH")
          APK_VERSION=$(echo "$APK_FILENAME" | grep -oE '[0-9]+(\.[0-9]+){2,}' | head -1 || true)
          if [ -z "$APK_VERSION" ] && [ -n "$TARGET_VERSION" ]; then
            APK_VERSION="$TARGET_VERSION"
          fi
          if [ -z "$APK_VERSION" ]; then
            APK_VERSION="unknown"
          fi
          echo "version=$APK_VERSION" >> "$GITHUB_OUTPUT"
          echo "::notice::Downloaded ${{ matrix.name }} → $APK_PATH (v$APK_VERSION)"

      - name: Prepare signing keystore (required)
        id: keystore
        run: |
          set -euo pipefail

          KEYSTORE_B64="${{ secrets.KEYSTORE_BASE64 }}"
          KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
          KEY_PASSWORD_RAW="${{ secrets.KEY_PASSWORD }}"
          KEY_ALIAS_INPUT="${{ secrets.KEY_ALIAS }}"

          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is required (signed builds are enforced)."
            exit 1
          fi
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "::error::KEYSTORE_PASSWORD secret is required (signed builds are enforced)."
            exit 1
          fi
          BCPROV_JAR="$(ls -1 /usr/share/java/bcprov*.jar 2>/dev/null | head -n1 || true)"
          if [ -z "$BCPROV_JAR" ] || [ ! -f "$BCPROV_JAR" ]; then
            echo "::error::BouncyCastle provider JAR not found on runner."
            exit 1
          fi

          RAW_KEYSTORE="$TOOLS_DIR/source.keystore"
          DEST_KEYSTORE="$TOOLS_DIR/morphe.bks"
          rm -f "$RAW_KEYSTORE" "$DEST_KEYSTORE"

          echo "$KEYSTORE_B64" | base64 -d > "$RAW_KEYSTORE"

          detect_keystore_type() {
            local type="$1"
            local -a args=(keytool -list -keystore "$RAW_KEYSTORE" -storetype "$type" -storepass "$KEYSTORE_PASSWORD")
            if [ "$type" = "BKS" ] || [ "$type" = "UBER" ]; then
              args+=(-providerclass org.bouncycastle.jce.provider.BouncyCastleProvider -providerpath "$BCPROV_JAR")
            fi
            "${args[@]}" >/dev/null 2>&1
          }

          SRC_TYPE=""
          for t in PKCS12 JKS BKS UBER; do
            if detect_keystore_type "$t"; then
              SRC_TYPE="$t"
              break
            fi
          done

          if [ -z "$SRC_TYPE" ]; then
            echo "::error::Could not detect source keystore type using PKCS12/JKS/BKS/UBER."
            exit 1
          fi
          echo "::notice::Detected source keystore type: $SRC_TYPE"

          IMPORT_LOG="$RUNNER_TEMP/keytool_import_${{ matrix.name }}.log"
          run_import() {
            local mode="$1"
            shift
            echo "::notice::Converting keystore to BKS (mode=$mode)..."
            set +e
            "$@" >"$IMPORT_LOG" 2>&1
            local rc=$?
            set -e
            if [ "$rc" -ne 0 ]; then
              echo "::warning::keytool import failed in mode=$mode"
              cat "$IMPORT_LOG" || true
            fi
            return "$rc"
          }

          IMPORT_BASE_ARGS=(
            keytool -importkeystore -noprompt
            -srckeystore "$RAW_KEYSTORE"
            -srcstoretype "$SRC_TYPE"
            -srcstorepass "$KEYSTORE_PASSWORD"
            -destkeystore "$DEST_KEYSTORE"
            -deststoretype BKS
            -deststorepass "$KEYSTORE_PASSWORD"
            -providerclass org.bouncycastle.jce.provider.BouncyCastleProvider
            -providerpath "$BCPROV_JAR"
          )

          # Try import without explicit key password first. This works for the common case where
          # key password matches store password and avoids false failures from wrong KEY_PASSWORD.
          if ! run_import "no-keypass" "${IMPORT_BASE_ARGS[@]}"; then
            # Retry with explicit key password if provided.
            if [ -n "$KEY_PASSWORD_RAW" ]; then
              rm -f "$DEST_KEYSTORE"
              if ! run_import "explicit-keypass" "${IMPORT_BASE_ARGS[@]}" -srckeypass "$KEY_PASSWORD_RAW" -destkeypass "$KEY_PASSWORD_RAW"; then
                echo "::error::Failed to convert keystore to BKS."
                echo "::error::Check KEYSTORE_PASSWORD and KEY_PASSWORD secrets."
                exit 1
              fi
            else
              echo "::error::Failed to convert keystore to BKS."
              echo "::error::If your key password differs from KEYSTORE_PASSWORD, set KEY_PASSWORD secret."
              exit 1
            fi
          fi

          if [ ! -f "$DEST_KEYSTORE" ]; then
            echo "::error::Failed to create converted BKS keystore."
            exit 1
          fi

          list_aliases() {
            keytool -list \
              -keystore "$DEST_KEYSTORE" \
              -storetype BKS \
              -storepass "$KEYSTORE_PASSWORD" \
              -providerclass org.bouncycastle.jce.provider.BouncyCastleProvider \
              -providerpath "$BCPROV_JAR" \
              2>/dev/null | awk -F, '/,/{print $1}' | sed '/^$/d'
          }

          mapfile -t KEY_ALIASES < <(list_aliases)
          if [ "${#KEY_ALIASES[@]}" -eq 0 ]; then
            echo "::error::No aliases found in converted keystore."
            exit 1
          fi

          KEY_ALIAS="$KEY_ALIAS_INPUT"
          if [ -z "$KEY_ALIAS" ]; then
            KEY_ALIAS="${KEY_ALIASES[0]}"
            echo "::notice::No KEY_ALIAS provided; using alias '$KEY_ALIAS'."
          else
            ALIAS_FOUND=false
            for a in "${KEY_ALIASES[@]}"; do
              if [ "$a" = "$KEY_ALIAS" ]; then
                ALIAS_FOUND=true
                break
              fi
            done
            if [ "$ALIAS_FOUND" = false ]; then
              echo "::error::KEY_ALIAS '$KEY_ALIAS' was not found in the converted keystore."
              echo "::notice::Available aliases: ${KEY_ALIASES[*]}"
              exit 1
            fi
          fi

          echo "path=$DEST_KEYSTORE" >> "$GITHUB_OUTPUT"
          echo "alias=$KEY_ALIAS" >> "$GITHUB_OUTPUT"
          echo "::notice::Prepared BKS keystore for Morphe signing."

      - name: Patch ${{ matrix.name }} with morphe-cli
        id: patch
        run: |
          set -euo pipefail
          JAR="$(ls -1 $TOOLS_DIR/morphe-cli*.jar | head -n1)"
          MPP="$TOOLS_DIR/${PATCH_SLUG}.mpp"
          if [ ! -f "$MPP" ]; then
            echo "::error::Patch file not found: $MPP"
            exit 1
          fi
          APK="${{ steps.getapk.outputs.apk }}"
          APK_VERSION="${{ steps.getapk.outputs.version }}"
          APK_NORM="${APK#./}"
          KEYSTORE_FILE="${{ steps.keystore.outputs.path }}"
          KEY_ALIAS="${{ steps.keystore.outputs.alias }}"
          KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
          KEY_ENTRY_PASS="${{ secrets.KEY_PASSWORD }}"
          if [ -z "$KEY_ENTRY_PASS" ]; then
            KEY_ENTRY_PASS="$KEYSTORE_PASSWORD"
          fi

          # Signed builds are enforced.
          if [ -z "$KEYSTORE_FILE" ] || [ ! -f "$KEYSTORE_FILE" ]; then
            echo "::error::Prepared keystore file not found."
            exit 1
          fi
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "::error::KEYSTORE_PASSWORD secret is required for signing."
            exit 1
          fi
          KEY_ARGS=(--keystore="$KEYSTORE_FILE" --keystore-password="$KEYSTORE_PASSWORD" --keystore-entry-alias="$KEY_ALIAS" --keystore-entry-password="$KEY_ENTRY_PASS")

          # Build enabled/disabled lists from patches.json and pass disabled ones to morphe-cli.
          ENABLED_PATCHES="$(jq -r \
            --arg repo "$PATCH_REPO" \
            --arg pkg "${{ matrix.appId }}" \
            '.[$repo][$pkg] // {} | to_entries[] | select(.value == true) | .key' \
            patches.json 2>/dev/null || true)"
          DISABLED_PATCHES="$(jq -r \
            --arg repo "$PATCH_REPO" \
            --arg pkg "${{ matrix.appId }}" \
            '.[$repo][$pkg] // {} | to_entries[] | select(.value == false) | .key' \
            patches.json 2>/dev/null || true)"
          if [ -z "$ENABLED_PATCHES" ] && [ -z "$DISABLED_PATCHES" ]; then
            echo "::warning::No patches.json entry for ${PATCH_REPO}/${{ matrix.appId }}; applying all patches."
          fi
          ENABLED_COUNT="$(printf '%s\n' "$ENABLED_PATCHES" | sed '/^$/d' | wc -l | tr -d ' ')"
          DISABLED_COUNT="$(printf '%s\n' "$DISABLED_PATCHES" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "$ENABLED_COUNT" -gt 0 ]; then
            echo "::notice::Enabled patches for ${{ matrix.appId }} (${ENABLED_COUNT}): $(printf '%s\n' "$ENABLED_PATCHES" | sed '/^$/d' | paste -sd '; ' -)"
          else
            echo "::notice::Enabled patches for ${{ matrix.appId }}: none"
          fi

          if [ "$DISABLED_COUNT" -gt 0 ]; then
            echo "::notice::Disabled patches for ${{ matrix.appId }} (${DISABLED_COUNT}): $(printf '%s\n' "$DISABLED_PATCHES" | sed '/^$/d' | paste -sd '; ' -)"
          else
            echo "::notice::Disabled patches for ${{ matrix.appId }}: none"
          fi

          PATCH_ARGS=()
          while IFS= read -r patch_name; do
            [ -z "$patch_name" ] && continue
            PATCH_ARGS+=("-d" "$patch_name")
          done <<< "$DISABLED_PATCHES"

          # Create marker file so we can deterministically find CLI output files created in this step.
          MARKER="$RUNNER_TEMP/morphe_${{ matrix.name }}_start.marker"
          : > "$MARKER"

          PATCH_LOG="$RUNNER_TEMP/morphe_patch_${{ matrix.name }}.log"
          PATCH_TMP_DIR="$RUNNER_TEMP/morphe_${{ matrix.name }}"

          run_patch() {
            local mode="$1"
            shift
            echo "::notice::Running morphe-cli for ${{ matrix.appId }} (v$APK_VERSION, mode=$mode)..."
            set +e
            "$@" 2>&1 | tee "$PATCH_LOG"
            local rc=${PIPESTATUS[0]}
            set -e
            return "$rc"
          }

          build_patch_cmd() {
            local -a cmd=(java -jar "$JAR" patch --patches="$MPP")
            cmd+=("${KEY_ARGS[@]}")
            cmd+=(--temporary-files-path="$PATCH_TMP_DIR" --purge)
            cmd+=("${PATCH_ARGS[@]}")
            cmd+=("$APK")
            printf '%s\0' "${cmd[@]}"
          }

          mapfile -d '' -t PATCH_CMD < <(build_patch_cmd)
          if ! run_patch "signed-required" "${PATCH_CMD[@]}"; then
            if grep -q "Wrong version of key store" "$PATCH_LOG"; then
              echo "::error::Morphe could not read the provided keystore (Wrong version of key store)."
              echo "::error::Ensure KEYSTORE_BASE64 decodes to a valid keystore and KEYSTORE_PASSWORD/KEY_PASSWORD are correct."
            fi
            exit 1
          fi

          # Collect output: prefer APKs newer than marker and not equal to input APK.
          OUT_APK="$( \
            { find . -maxdepth 1 -type f -name "*.apk" -newer "$MARKER" -printf '%T@ %p\n' || true; \
              find "$APKS_DIR" -maxdepth 1 -type f -name "*.apk" -newer "$MARKER" -printf '%T@ %p\n' || true; } \
            | sort -nr \
            | cut -d' ' -f2- \
            | awk -v apk="$APK_NORM" '
                {
                  line=$0
                  sub(/^\.\//, "", line)
                  if (line != "" && line != apk && out == "") out=line
                }
                END { if (out != "") print out }
              ' \
          )"

          # Fallback: pick newest non-input APK if timestamps are not reliable.
          if [ -z "$OUT_APK" ] || [ ! -f "$OUT_APK" ]; then
            OUT_APK="$( \
              { find . -maxdepth 1 -type f -name "*.apk" -printf '%T@ %p\n' || true; \
                find "$APKS_DIR" -maxdepth 1 -type f -name "*.apk" -printf '%T@ %p\n' || true; } \
              | sort -nr \
              | cut -d' ' -f2- \
              | awk -v apk="$APK_NORM" '
                  {
                    line=$0
                    sub(/^\.\//, "", line)
                    if (line != "" && line != apk && out == "") out=line
                  }
                  END { if (out != "") print out }
                ' \
            )"
          fi
          if [ -z "$OUT_APK" ] || [ ! -f "$OUT_APK" ]; then
            echo "::error::Could not locate patched APK output"
            echo "::notice::Files in current directory:"
            ls -la
            echo "::notice::Files in $APKS_DIR:"
            ls -la "$APKS_DIR" || true
            exit 1
          fi
          
          # Rename with version info
          OUTPUT_NAME="${{ matrix.name }}-${PATCH_TAG}-v${APK_VERSION}.apk"
          mv "$OUT_APK" "$OUT_DIR/$OUTPUT_NAME"
          echo "output=$OUTPUT_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload patched ${{ matrix.name }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ matrix.patchTag }}-v${{ steps.getapk.outputs.version }}
          path: out/${{ steps.patch.outputs.output }}

  create-release:
    needs: [check-versions, build]
    if: needs.build.result == 'success' && needs.check-versions.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all APKs
        uses: actions/download-artifact@v4
        with:
          pattern: "*-*-v*"
          path: apks
          merge-multiple: true

      - name: List downloaded APKs
        run: |
          echo "Downloaded APKs:"
          ls -la apks/

      - name: Create single release with all APKs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          DATE_TAG="v$(date -u +%Y.%m.%d)"
          CLI_VERSION="${{ needs.check-versions.outputs.cli-version }}"
          CLI_BRANCH="${{ needs.check-versions.outputs.cli-branch }}"
          REPO_VERSIONS='${{ needs.check-versions.outputs.repo-versions }}'

          PATCHES_SUMMARY="$(echo "$REPO_VERSIONS" | jq -r 'to_entries | map("- \(.key): \(.value)") | join("\n")')"

          RELEASE_TITLE="Morphe Patched Apps (${CLI_BRANCH}-${CLI_VERSION})"

          RELEASE_NOTES="$(cat <<EOF
          Morphe-patched apps release.

          **CLI channel:** ${CLI_BRANCH}
          **CLI version:** ${CLI_VERSION}

          **Patch repo versions:**
          ${PATCHES_SUMMARY}

          ## Available APKs
          $(ls -1 apks/*.apk | xargs -I {} basename {})

          ## Obtainium Setup
          Use filename filtering to subscribe to specific apps:
          - YouTube: \`^youtube.*\\.apk$\`
          - YouTube Music: \`^ytmusic.*\\.apk$\`
          - Reddit: \`^reddit.*\\.apk$\`
          EOF
          )"

          if [ -z "$(ls -A apks/)" ]; then
            echo "::error::No APK files found in apks/ directory"
            exit 1
          fi

          if gh release view "$DATE_TAG" >/dev/null 2>&1; then
            echo "::notice::Release $DATE_TAG exists; uploading new assets."
            for apk in apks/*.apk; do
              gh release upload "$DATE_TAG" "$apk" --clobber
            done
            gh release edit "$DATE_TAG" --title "$RELEASE_TITLE" --notes "$RELEASE_NOTES"
          else
            echo "::notice::Creating release $DATE_TAG"
            gh release create "$DATE_TAG" apks/*.apk \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES"
          fi

          echo "::notice::Published release: ${DATE_TAG}"

  update-download-urls:
    needs: create-release
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Commit updated config.json
        run: |
          # Note: this job runs on a fresh checkout; config.json changes from
          # other runners are not automatically present here. The git status check
          # will typically find nothing to commit. This is a known pre-existing
          # limitation — URL commits happen via update-state job's git add instead.
          if [ -n "$(git status --porcelain)" ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add config.json
            git commit -m "chore: update download URLs after successful build" || true
            git push || true
          else
            echo "No changes to config.json on this runner"
          fi

  update-state:
    needs: [check-versions, build, create-release]
    if: needs.build.result == 'success' && needs.check-versions.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update state.json
        run: |
          set -euo pipefail

          REPO_VERSIONS='${{ needs.check-versions.outputs.repo-versions }}'
          BEFORE_STATE_HASH="$(
            if [ -f state.json ]; then sha256sum state.json | awk '{print $1}'; else echo "missing"; fi
          )"
          BEFORE_PATCHES_HASH="$(
            if [ -f patches.json ]; then sha256sum patches.json | awk '{print $1}'; else echo "missing"; fi
          )"

          # Sync patches.json to repo-keyed structure (same logic as update-patches.yml)
          COMPAT_FN='
            def compat_pkg_names($patch):
              if ($patch.compatiblePackages? | type) == "object" then
                ($patch.compatiblePackages | keys)
              elif ($patch.compatible_packages? | type) == "object" then
                ($patch.compatible_packages | keys)
              elif ($patch.compatiblePackages? | type) == "array" then
                ($patch.compatiblePackages | map(.name // .packageName // empty))
              elif ($patch.compatible_packages? | type) == "array" then
                ($patch.compatible_packages | map(.name // .packageName // empty))
              else
                []
              end;
          '

          REPO_PAIRS="$(jq -r '
            .patch_repos
            | to_entries
            | map(.value | "\(.repo)|\(.branch | ascii_downcase)")
            | unique[]
          ' config.json)"

          # Guard: nothing to sync if no repos configured
          if [ -z "$REPO_PAIRS" ]; then
            echo "::warning::No repos in patch_repos; skipping patches.json sync."
          else

          # Fetch patches-list.json for each unique repo
          mkdir -p "$RUNNER_TEMP/patches-lists"
          while IFS='|' read -r repo branch; do
            slug="${repo//\//-}"
            tag="$(echo "$REPO_VERSIONS" | jq -r --arg r "$repo" '.[$r] // empty')"
            if [ -z "$tag" ]; then
              echo "::warning::No resolved tag for ${repo}; skipping patches sync for this repo."
              continue
            fi
            url="https://raw.githubusercontent.com/${repo}/${tag}/patches-list.json"
            curl -fsSL "$url" -o "$RUNNER_TEMP/patches-lists/${slug}.json" || \
              echo "::warning::Failed to fetch patches-list.json for ${repo}; skipping."
          done <<< "$REPO_PAIRS"

          # Determine if existing patches.json is repo-keyed
          EXISTING_IS_REPO_KEYED=false
          if [ -s patches.json ] && jq -e 'type=="object"' patches.json >/dev/null 2>&1; then
            if jq -e 'keys | map(select(contains("/"))) | length > 0' patches.json >/dev/null 2>&1; then
              EXISTING_IS_REPO_KEYED=true
            fi
          fi

          if [ "$EXISTING_IS_REPO_KEYED" = "true" ]; then
            cp patches.json "$RUNNER_TEMP/patches_base.json"
          else
            echo '{}' > "$RUNNER_TEMP/patches_base.json"
          fi

          while IFS='|' read -r repo branch; do
            slug="${repo//\//-}"
            PATCHES_LIST="$RUNNER_TEMP/patches-lists/${slug}.json"
            [ -f "$PATCHES_LIST" ] || continue

            APPS_FOR_REPO="$(jq -c --arg r "$repo" '
              [.patch_repos | to_entries[]
                | select(.value.repo == $r)
                | .key]
            ' config.json)"

            jq --argjson apps "$APPS_FOR_REPO" "$COMPAT_FN"'
              . as $src
              | reduce $apps[] as $pkg ({};
                  .[$pkg] = (
                    reduce (
                      (($src.patches // $src)[])
                      | select((compat_pkg_names(.) | index($pkg)) != null)
                      | .name
                    ) as $name
                    ({};
                      .[$name] = true
                    )
                  )
                )
            ' "$PATCHES_LIST" > "$RUNNER_TEMP/defaults_${slug}.json"

            # Same merge logic as update-patches.yml: only upstream keys survive.
            jq -n \
              --arg repo "$repo" \
              --slurpfile defaults "$RUNNER_TEMP/defaults_${slug}.json" \
              --slurpfile base "$RUNNER_TEMP/patches_base.json" '
              ($defaults[0] // {}) as $d
              | ($base[0] // {}) as $existing
              | ($existing[$repo] // {}) as $repo_existing
              | reduce ($d | keys[]) as $pkg ({};
                  .[$pkg] = (
                    reduce ($d[$pkg] | keys[]) as $pname ({};
                      .[$pname] = (($repo_existing[$pkg] // {})[$pname] // true)
                    )
                  )
                )
            ' > "$RUNNER_TEMP/merged_${slug}.json"

            jq --arg repo "$repo" \
               --slurpfile merged "$RUNNER_TEMP/merged_${slug}.json" \
               '.[$repo] = $merged[0]' \
               "$RUNNER_TEMP/patches_base.json" > "$RUNNER_TEMP/patches_next.json"
            mv "$RUNNER_TEMP/patches_next.json" "$RUNNER_TEMP/patches_base.json"
          done <<< "$REPO_PAIRS"

          ACTIVE_REPOS="$(jq -c '[.patch_repos | to_entries[] | .value.repo] | unique' config.json)"
          jq --argjson active "$ACTIVE_REPOS" \
            'with_entries(select(.key as $k | $active | index($k) != null))' \
            "$RUNNER_TEMP/patches_base.json" > patches.json.tmp
          mv patches.json.tmp patches.json

          fi # end REPO_PAIRS guard

          # Ensure state file is valid JSON before merge/update.
          if [ ! -s state.json ] || ! jq -e 'type=="object"' state.json >/dev/null 2>&1; then
            echo "::warning::state.json is missing or invalid JSON; recreating with defaults."
            echo '{}' > state.json
          fi

          # Build patches map for state.json: { "owner/repo": { branch, version } }
          # Use first() to avoid duplicate outputs when multiple apps share one repo.
          PATCHES_MAP="$(echo "$REPO_VERSIONS" | jq -c \
            --argjson config "$(jq -c '.' config.json)" \
            'to_entries | map({
              key: .key,
              value: {
                branch: (first($config.patch_repos | to_entries[] | select(.value.repo == .key) | .value.branch) // "main" | ascii_downcase),
                version: .value
              }
            }) | from_entries' 2>/dev/null || echo '{}')"

          jq --argjson patches_map "$PATCHES_MAP" \
             --arg cli "${{ needs.check-versions.outputs.cli-version }}" \
             --arg cli_branch "${{ needs.check-versions.outputs.cli-branch }}" \
             --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
             --arg run_id "${{ github.run_id }}" \
             --argjson run_number "${{ github.run_number }}" \
             --arg sha "${{ github.sha }}" \
             '. as $s
             | (
                 ((.build_history // [])
                  + [{
                      "timestamp": $timestamp,
                      "patches": $patches_map,
                      "cli_version": $cli,
                      "cli_branch": $cli_branch,
                      "status": "success",
                      "run_id": $run_id,
                      "run_number": $run_number,
                      "commit": $sha
                  }])
                 | if length > 100 then .[-100:] else . end
               ) as $history
             | {
                 "patches": $patches_map,
                 "cli_branch": $cli_branch,
                 "cli_version": $cli
               }
             + ($s | del(
                 .patches,
                 .patches_branch,
                 .patches_version,
                 .cli_branch,
                 .cli_version,
                 .last_build,
                 .status,
                 .build_history
               ))
             + {
                 "last_build": $timestamp,
                 "status": "success",
                 "build_history": $history
               }' state.json > state.json.tmp && mv state.json.tmp state.json

          AFTER_STATE_HASH="$(sha256sum state.json | awk '{print $1}')"
          AFTER_PATCHES_HASH="$(sha256sum patches.json | awk '{print $1}')"
          echo "::notice::state.json hash: ${BEFORE_STATE_HASH} -> ${AFTER_STATE_HASH}"
          echo "::notice::patches.json hash: ${BEFORE_PATCHES_HASH} -> ${AFTER_PATCHES_HASH}"

      - name: Commit state.json and patches.json
        run: |
          set -euo pipefail
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add state.json patches.json config.json

          if git diff --cached --quiet; then
            echo "::error::No state/patches changes detected after update step; refusing silent success."
            echo "::notice::Current state.json:"
            cat state.json || true
            exit 1
          fi

          git commit -m "chore: update state and patches config - cli ${{ needs.check-versions.outputs.cli-branch }}/${{ needs.check-versions.outputs.cli-version }}"

          BRANCH_NAME="${GITHUB_REF_NAME:-main}"
          for attempt in 1 2 3; do
            if git push origin "HEAD:${BRANCH_NAME}"; then
              echo "::notice::Pushed state updates to ${BRANCH_NAME}."
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to push state updates after ${attempt} attempts."
              exit 1
            fi

            echo "::warning::Push rejected (attempt ${attempt}); rebasing on origin/${BRANCH_NAME} and retrying..."
            git fetch origin "${BRANCH_NAME}"
            git rebase "origin/${BRANCH_NAME}"
          done
